{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-g" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Neon Admin Panel – Create Campaign" />
    <link rel="icon" href="{% static 'assets/images/favicon.ico' %}" />
    <title>Create Campaign - Publisha</title>

    <!-- Core CSS -->
    <link
      rel="stylesheet"
      href="{% static 'assets/css/font-icons/entypo/css/entypo.css' %}"
    />
    <link rel="stylesheet" href="{% static 'assets/css/custom.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/neon-core.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/neon-theme.css' %}" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="{% static 'assets/css/neon-forms.css' %}" />
    <link
      rel="stylesheet"
      href="{% static 'assets/css/publisha-campaign.css' %}"
    />
  </head>

  <body class="page-body">
    <div class="page-container">
      <!-- ■■■ SIDEBAR ■■■ -->
      {% include 'partials/_admin_sidebar.html' %}
      <!-- /SIDEBAR -->

      <!-- ■■■ MAIN CONTENT ■■■ -->
      <div class="main-content">
        <!-- — Header — -->
        {% include 'partials/_admin_header.html' %}
        <!-- /Header -->

        <hr />

        {% block content %} {% endblock content %}

        <footer class="main">
          © 2025 <strong>Publisha</strong> Admin Panel
        </footer>
      </div>
      <!-- /main-content -->
    </div>
    <!-- /page-container -->

    <!-- Core JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
    <script src="{% static 'assets/js/bootstrap.js' %}" defer></script>
    <!-- Add other specific JS files for your page inside a block if needed -->
    {% block scripts %} {% endblock scripts %}
  </body>
</html>
