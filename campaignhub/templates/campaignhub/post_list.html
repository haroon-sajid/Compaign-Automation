  <script>
    (function ($) {
      'use strict';

      // Function to get CSRF token from cookies for safe POST requests
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
              cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
              break;
            }
          }
        }
        return cookieValue;
      }
      const csrftoken = getCookie('csrftoken');

      // Setup jQuery AJAX to include CSRF token in headers
      $.ajaxSetup({
        beforeSend: function (xhr, settings) {
          if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type) && !this.crossDomain) {
            xhr.setRequestHeader("X-CSRFToken", csrftoken);
          }
        }
      });

      // --- Data Initialization ---
      // Data is now securely passed from the Django template
      let data;
      try {
        const jsonData = '{{ posts_json|escapejs }}';
        data = JSON.parse(jsonData);
      } catch (e) {
        console.error("Error parsing posts data from Django:", e);
        data = [];
      }

      // --- Helper Functions ---
      const fmt = (iso) => {
        if (!iso) return '—';
        const d = new Date(iso);
        return isNaN(d) ? iso : d.toLocaleString();
      };

      const badge = (status) => {
        const map = {
          published: { cls: 'st-published', txt: 'Published' },
          scheduled: { cls: 'st-scheduled', txt: 'Scheduled' },
          draft: { cls: 'st-draft', txt: 'Draft' },
          failed: { cls: 'st-failed', txt: 'Failed' },
          queued: { cls: 'st-queued', txt: 'Queued' }
        };
        const it = map[status] || map.draft;
        return `<span class="badge-status ${it.cls}"><span class="dot"></span>${it.txt}</span>`;
      };

      function updateKpis(arr) {
        $('#kpiAll').text(arr.length);
        $('#kpiPublished').text(arr.filter(x => x.status === 'published').length);
        $('#kpiScheduled').text(arr.filter(x => x.status === 'scheduled' || x.status === 'queued').length);
        $('#kpiDraft').text(arr.filter(x => x.status === 'draft').length);
        $('#kpiFailed').text(arr.filter(x => x.status === 'failed').length);
      }

      updateKpis(data);

      // --- DataTable Initialization ---
      const table = $('#postsTable').DataTable({
        data: data,
        columns: [
          { data: null, orderable: false, render: (d, t, r) => `<input type="checkbox" class="row-select" data-id="${r.id}">` },
          { data: null, render: (d, t, r, meta) => meta.row + 1 },
          { data: 'title', render: v => `<strong>${(v || '').replace(/</g, '&lt;')}</strong>` },
          { data: 'campaign', render: v => v || '—' },
          { data: 'channel', render: v => v || '—' },
          { data: 'status', render: v => badge(v) },
          { data: 'publishAt', render: v => fmt(v) },
          { data: 'createdAt', render: v => fmt(v) },
          { data: 'owner', render: v => v || '—' },
          {
            data: null,
            orderable: false,
            className: 'actions',
            render: (d, t, r) => `
              <div class="btn-group">
                <button  class="btn btn-ghost btn-xs dropdown-toggle" data-toggle="dropdown">Actions <span class="caret"></span></button>
                <ul class="dropdown-menu dropdown-menu-right">
<li>
  <a href="#" class="act-publish text-danger" data-id="${r.id}">
    <i class="entypo-eye"></i> Publish Now
  </a>
</li>
<li>
  <a href="#" class="act-schedule text-danger" data-id="${r.id}">
    <i class="entypo-pencil"></i> Set Scheduled
  </a>
</li>
<li>
  <a href="#" class="act-draft text-danger" data-id="${r.id}">
    <i class="entypo-upload"></i> Set Draft
  </a>
</li>
<li>
  <a href="#" class="act-delete text-danger" data-id="${r.id}">
    <i class="entypo-trash"></i> Delete
  </a>
</li>

                </ul>
              </div>`
          }
        ],
        order: [[7, 'desc']],
        pageLength: 10,
        autoWidth: false,
        dom: '<"row"<"col-sm-6"l><"col-sm-6">>t<"row"<"col-sm-5"i><"col-sm-7"p>>'
      });
 $('#postsTable_wrapper').toggleClass('dataTables_wrapper my-table-container');
  

      // --- Event Handlers ---
      $('#tableSearch').on('keyup', function () { table.search(this.value).draw(); });
      $('#selectAll').on('change', function () { $('.row-select').prop('checked', this.checked); });

      $('.pill').on('click', function () {
        $('.pill').removeClass('active');
        $(this).addClass('active');
        const s = $(this).data('status');
        if (s === 'all') {
          table.column(5).search('').draw();
          return;
        }
        const label = s === 'published' ? 'Published' : s === 'scheduled' ? 'Scheduled|Queued' : s === 'draft' ? 'Draft' : 'Failed';
        table.column(5).search(label, true, false).draw();
      });

      $('#channelFilter').on('change', function () {
        const v = this.value;
        table.column(4).search(v === 'all' ? '' : '^' + v + '$', true, false).draw();
      });

      // --- AJAX Event Handlers ---

      // Bulk actions
      $('#applyBulk').on('click', function () {
        const action = $('#bulkSelect').val();
        if (!action) return alert('Choose a bulk action first.');

        const ids = $('.row-select:checked').map((_, el) => $(el).data('id')).get();
        if (!ids.length) return alert('Select at least one row.');

        if (action === 'delete' && !confirm(`Are you sure you want to delete ${ids.length} selected posts?`)) return;

        $.ajax({
          url: "{% url 'campaignhub:api_post_bulk_action' %}",
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ action: action, ids: ids }),
          success: function (response) {
            alert(response.message || 'Action completed successfully!');
            location.reload(); // Easiest way to reflect all changes
          },
          error: function (xhr) {
            let errorMsg = 'An unexpected error occurred.'; // A generic fallback
            if (xhr.responseJSON) {
              // Prioritize the 'message' key from our Django view
              errorMsg = xhr.responseJSON.message || xhr.responseJSON.error || errorMsg;
            }
            alert('Error: ' + errorMsg); // This will now show the specific message
          }
        });
      });

function handleSingleAction(id, action, successMessage) {
  if ((action === 'delete' && !confirm('Are you sure you want to delete this post?'))) return;

  $.ajax({
    url: "{% url 'campaignhub:api_post_bulk_action' %}", // use bulk-action endpoint
    type: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ action: action, ids: [id] }),
    success: function(response) {
      alert(response.message || successMessage);
      location.reload();
    },
    error: function(xhr) {
      let errorMsg = 'An unexpected error occurred.';
      if (xhr.responseJSON) {
        errorMsg = xhr.responseJSON.message || xhr.responseJSON.error || errorMsg;
      }
      alert('Error: ' + errorMsg);
    }
  });

  $.ajax({
    url: "{% url 'campaignhub:api_post_bulk_action' %}",
    type: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ action: 'delete', ids: [id] }),
    success: function (response) {
      alert(response.message || 'Post deleted.');
      location.reload();
    },
    error: function (xhr) {
      alert('Error: ' + (xhr.responseJSON ? xhr.responseJSON.message : 'Could not delete post.'));

  });
});

      $('#postsTable').on('click', '.act-toggle', function (e) {
        e.preventDefault();
        const id = $(this).data('id');
        const rowData = table.rows().data().toArray().find(r => r.id === id);
        if (!rowData) return;

        const newStatus = rowData.status === 'draft' ? 'SCHEDULED' : 'DRAFT';

        $.ajax({
          url: `/campaignhub/api/posts/${id}/status/`,
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ status: newStatus }),
          success: function (response) {
            alert(response.message || 'Status updated.');
            location.reload();
