{% extends "_base.html" %} {% block content %}
<section class="login-area pt-140 pb-60" style="margin-top: 10%">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xl-6 col-lg-8">
        <div class="login-content">
          <h3 class="login-content-title">Forgot Your Password?</h3>
          <p class="mb-30">
            Enter your email address below, and we'll email instructions for
            setting a new one.
          </p>

          <form method="post" class="login-form">
            {% csrf_token %}

            <div class="login-form-item mb-25">
              {{ form.email.errors }}
              <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
                id="id_email"
              />
              <i class="fa-light fa-envelope"></i>
            </div>

            <div class="login-form-item mb-25">
              <button type="submit" class="theme-btn">Send Reset Link</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
